<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Navy background matching site mountain-950 -->
  <rect width="100" height="100" rx="16" fill="#0a1929"/>

  <!--
    Six-arm snowflake — modelled on Mt Baw Baw Alpine Resort's
    signature snowflake brand mark.
    Each arm: length 38 from centre, two sets of branches at 60°.
    Arms at 0° / 60° / 120° / 180° / 240° / 300°.
    Centre point (50, 50).
  -->
  <g transform="translate(50,50)" stroke="#c8deff" stroke-linecap="round" fill="none">

    <!-- Arm 0° (pointing up) -->
    <g transform="rotate(0)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <!-- large branches at r=22 -->
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <!-- small tip branches at r=31 -->
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>

    <!-- Arm 60° -->
    <g transform="rotate(60)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>

    <!-- Arm 120° -->
    <g transform="rotate(120)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>

    <!-- Arm 180° (pointing down) -->
    <g transform="rotate(180)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>

    <!-- Arm 240° -->
    <g transform="rotate(240)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>

    <!-- Arm 300° -->
    <g transform="rotate(300)">
      <line x1="0" y1="0"   x2="0" y2="-38" stroke-width="5"/>
      <line x1="0" y1="-22" x2="-9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-22" x2=" 9.5" y2="-27.5" stroke-width="3.5"/>
      <line x1="0" y1="-31" x2="-5.2" y2="-33.6" stroke-width="2.5"/>
      <line x1="0" y1="-31" x2=" 5.2" y2="-33.6" stroke-width="2.5"/>
    </g>
  </g>

  <!-- Centre dot -->
  <circle cx="50" cy="50" r="5" fill="#c8deff"/>
</svg>
